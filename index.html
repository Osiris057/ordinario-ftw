<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="timezone" content="America/Mexico_City">
    <title>Login - Atlas Corporation</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --box-light: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary-btn: #2563eb;
            --primary-hover: #1d4ed8;
            --border-color: #cbd5e1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .login-box {
            background-color: var(--box-light);
            padding: 2.5rem 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }

        .logo-container img {
            max-height: 80px;
            width: auto;
            padding: 6px;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 0;
            margin-bottom: 2rem;
            line-height: 1.4;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 1rem;
            box-sizing: border-box; 
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-btn);
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary-btn);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 1rem;
        }

        .login-btn:hover {
            background-color: var(--primary-hover);
        }
    </style>
</head>
<body>

    <div class="login-box">
        
        <div class="logo-container">
            <img src="src/LOGO_ATLAS_PNG_SIN_LETRAS.png" alt="Logo de Atlas Corporation">
        </div>
        
        <p class="subtitle">Servicio de gestión de puntos de venta de Atlas Corporation</p>

        <form action="#" method="POST">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" required placeholder="Ingresa tu usuario">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required placeholder="Ingresa tu contraseña">
            </div>

            <button type="submit" class="login-btn">Iniciar Sesión</button>
        </form>

    </div>
    <script>
        const form = document.querySelector('form');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            const inputUsername = document.getElementById('username').value;
            const inputPassword = document.getElementById('password').value;
            
            try {
                const response = await fetch('data/usuarios.xml');
                
                if (!response.ok) {
                    throw new Error('No se pudo cargar la base de datos de usuarios');
                }
                
                const xmlText = await response.text();
                
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                
                const usuarios = xmlDoc.getElementsByTagName('usuario');
                let loginExitoso = false;
                let rolUsuario = '';
                
                for (let i = 0; i < usuarios.length; i++) {
                    const user = usuarios[i].getElementsByTagName('username')[0].textContent;
                    const pass = usuarios[i].getElementsByTagName('password')[0].textContent;
                    
                    if (user === inputUsername && pass === inputPassword) {
                        loginExitoso = true;
                        rolUsuario = usuarios[i].getElementsByTagName('rol')[0].textContent;
                        break;
                    }
                }
                
                if (loginExitoso) {
                    sessionStorage.setItem('rolActivo', rolUsuario);
                    sessionStorage.setItem('usuarioActivo', inputUsername);
                    window.location.href = 'panel_admin.html';
                } else {
                    alert('Usuario o contraseña incorrectos');
                }
                
            } catch (error) {
                console.error('Error del sistema:', error);
                alert('Hubo un error al intentar iniciar sesión. Revisa la consola.');
            }
        });
    </script>
</body>
</html>
